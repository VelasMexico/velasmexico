<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias por tu compra | Velas México</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    /* Ensure the modal content is perfectly centered without relying on the fixed overlay since it's a static page */
    body {
      background-color: var(--color-bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="modal-content" style="max-width: 520px; text-align: center; padding: 3rem 2rem; transform: translateY(0) scale(1) !important; opacity: 1 !important;">
    <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
    <h2 style="font-family: var(--font-title); color: var(--color-accent); font-size: 2.5rem; margin-bottom: 1rem;">
      ¡Gracias por tu compra!</h2>
    <p style="color: #fff; margin-bottom: 1rem; font-size: 1.1rem; line-height: 1.7;">
      Tu pedido ha sido confirmado y está en proceso.
    </p>
    <p style="color: #aaa; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.6;">
      Enviamos los detalles de la orden a tu correo electrónico. Nos pondremos en contacto contigo pronto para <strong style="color: var(--color-accent);">iniciar la producción</strong> de tus velas artesanales. 🕯️
    </p>
    <button class="primary-btn"
      onclick="window.location.href='/';"
      style="background: linear-gradient(135deg, #d4af37, #f0c040); color: #000; font-weight: bold; letter-spacing: 2px; padding: 1rem 2.5rem; border: none; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; text-transform: uppercase;">
      Volver al inicio 🏠
    </button>
  </div>
</body>
</html>
